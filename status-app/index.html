<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHARDTOWN</title>
    <!--
      Preload Plus Jakarta Sans so the splash wordmark renders in the
      site's font from the very first paint. Without these `<link>`s the
      splash would briefly use the system fallback before PJS swaps in,
      and the "S" feels off.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap">
    <!--
      Splash screen — inline so the first paint of the WebView already
      shows the brand + ambient motion. Aurora gradients, massive
      wordmark with running shimmer, shimmer sweep on the logo, slim
      progress sweeper at the bottom. React calls
      `window.__shardtownHideSplash()` once auth has resolved.
    -->
    <style>
      html, body {
        margin: 0;
        background: #050608;
        color: #fff;
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #shardtown-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #050608;
        overflow: hidden;
        animation: ss-in 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #shardtown-splash.is-leaving {
        animation: ss-out 420ms cubic-bezier(0.4, 0, 1, 1) both;
        pointer-events: none;
      }

      /* ─── Aurora — 4 huge blurred blobs slowly drifting ──────────── */
      #shardtown-splash .ss-aurora {
        position: absolute;
        inset: -200px;
        overflow: hidden;
        pointer-events: none;
      }
      #shardtown-splash .ss-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        mix-blend-mode: screen;
        will-change: transform;
      }
      #shardtown-splash .ss-blob.b1 {
        top: -10%; left: -10%;
        width: 780px; height: 780px;
        background: radial-gradient(circle, rgba(91, 109, 255, 0.85), transparent 60%);
        animation: ss-blob1 22s ease-in-out infinite;
      }
      #shardtown-splash .ss-blob.b2 {
        bottom: -15%; right: -10%;
        width: 720px; height: 720px;
        background: radial-gradient(circle, rgba(168, 85, 247, 0.7), transparent 60%);
        animation: ss-blob2 26s ease-in-out infinite;
      }
      #shardtown-splash .ss-blob.b3 {
        top: 35%; left: 50%;
        transform: translateX(-50%);
        width: 520px; height: 520px;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.55), transparent 65%);
        animation: ss-blob3 19s ease-in-out infinite;
      }
      #shardtown-splash .ss-blob.b4 {
        top: 60%; left: 12%;
        width: 380px; height: 380px;
        background: radial-gradient(circle, rgba(236, 72, 153, 0.4), transparent 65%);
        animation: ss-blob4 24s ease-in-out infinite;
      }
      #shardtown-splash .ss-vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,0,0,0.6) 100%);
      }

      /* ─── Centre stack ──────────────────────────────────────────── */
      #shardtown-splash .ss-stack {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 2;
      }
      #shardtown-splash .ss-label {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
        margin: 0;
        animation: ss-fadein 1.2s ease-out 0.2s both;
      }
      #shardtown-splash .ss-wordmark {
        position: relative;
        /* Match the homepage SHARDTOWN wordmark: Plus Jakarta Sans
           extrabold uppercase, very tight tracking. */
        font-family: "Plus Jakarta Sans", -apple-system, sans-serif;
        font-size: clamp(72px, 13vw, 156px);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -0.055em;
        line-height: 0.9;
        margin: 0;
        background: linear-gradient(180deg, #ffffff 10%, rgba(255, 255, 255, 0.45) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: ss-fadein 1.2s ease-out 0.05s both;
      }
      #shardtown-splash .ss-wordmark::after {
        /* Shimmer sweep — same text shape on top of the parent, with a
           moving gradient clipped to it. We animate `background-position`
           on a static (non-translated) element so the wordmark never
           drifts out of alignment with the parent text. Previous version
           used `transform: translateX(...)` and showed two overlapping
           SHARDTOWNs offset by the translate distance. */
        content: 'SHARDTOWN';
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg,
          transparent 35%,
          rgba(255, 255, 255, 0.95) 50%,
          transparent 65%) -100% 0 / 200% 100% no-repeat;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: ss-shimmer 3.6s ease-in-out 0.8s infinite;
      }
      #shardtown-splash .ss-tag {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.55);
        margin: 0;
        letter-spacing: -0.005em;
        animation: ss-fadein 1.2s ease-out 0.4s both;
      }

      /* ─── Progress bar (sweep, indeterminate) ──────────────────── */
      #shardtown-splash .ss-progress {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 2px;
        background: rgba(255, 255, 255, 0.04);
        overflow: hidden;
        z-index: 3;
      }
      #shardtown-splash .ss-progress::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        width: 38%;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(91, 109, 255, 0.6) 35%,
          #a855f7 50%,
          rgba(91, 109, 255, 0.6) 65%,
          transparent 100%);
        box-shadow: 0 0 24px rgba(168, 85, 247, 0.7);
        animation: ss-progress 2.4s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      /* ─── Animations ───────────────────────────────────────────── */
      @keyframes ss-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes ss-out {
        from { opacity: 1; }
        to   { opacity: 0; visibility: hidden; }
      }
      @keyframes ss-fadein {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes ss-shimmer {
        0%   { background-position: -100% 0; }
        55%, 100% { background-position: 200% 0; }
      }
      @keyframes ss-progress {
        0%   { transform: translateX(-50%); }
        100% { transform: translateX(250%); }
      }
      @keyframes ss-blob1 {
        0%, 100% { transform: translate(0, 0)        scale(1); }
        50%      { transform: translate(80px, 60px)  scale(1.15); }
      }
      @keyframes ss-blob2 {
        0%, 100% { transform: translate(0, 0)        scale(1); }
        50%      { transform: translate(-100px, -60px) scale(1.1); }
      }
      @keyframes ss-blob3 {
        0%, 100% { transform: translateX(-50%) translateY(0)    scale(1); }
        50%      { transform: translateX(-50%) translateY(-80px) scale(1.2); }
      }
      @keyframes ss-blob4 {
        0%, 100% { transform: translate(0, 0)        scale(1); }
        50%      { transform: translate(140px, -40px) scale(1.18); }
      }

      @media (prefers-reduced-motion: reduce) {
        #shardtown-splash *,
        #shardtown-splash.is-leaving {
          animation-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="shardtown-splash" aria-hidden="true">
      <div class="ss-aurora">
        <div class="ss-blob b1"></div>
        <div class="ss-blob b2"></div>
        <div class="ss-blob b3"></div>
        <div class="ss-blob b4"></div>
      </div>
      <div class="ss-vignette"></div>

      <div class="ss-stack">
        <p class="ss-label">Studio</p>
        <h1 class="ss-wordmark">SHARDTOWN</h1>
        <p class="ss-tag">Ouverture de l'environnement…</p>
      </div>

      <div class="ss-progress"></div>
    </div>
    <div id="root"></div>
    <!--
      Splash lifecycle helper as an external file — Tauri's CSP enforces
      `script-src 'self'` so inline <script> tags are blocked in the
      packaged app. A local file at /splash.js satisfies that.
    -->
    <script src="/splash.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

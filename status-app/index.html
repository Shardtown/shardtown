<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/image/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHARDTOWN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap">
    <style>
      /* Style <html>, not <body>. The SPA's index.css applies
         `body { background: hsl(var(--background)) }` inside @layer base,
         which has *lower* cascade priority than rules outside any layer.
         If we set body here we'd override the design-system background
         everywhere → flat black on every page. Style html instead — it
         only shows during the brief moment before body's CSS lands. */
      html {
        margin: 0;
        background: #0a0a0a;
        color: #fafafa;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.01em;
      }
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

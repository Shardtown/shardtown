name: CI

# Validation rapide sur chaque PR et chaque push de branche non-release :
# - tests fumés Node + check syntaxique de server.js (Ubuntu)
# - tsc + Vite build de la SPA status-app (Ubuntu)
# - build Tauri non-signé (macOS arm64) — vérifie que le Rust compile et que
#   le bundle se génère, sans toucher aux secrets Apple
#
# Le pipeline release.yml reste exclusivement gated par tag/release-trigger
# et c'est lui qui s'occupe de la vraie signature + notarisation + upload.

on:
  pull_request:
  push:
    branches:
      - main

# Annule les runs en cours sur la même PR/branche quand un nouveau commit arrive.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Syntax check (server.js)
        run: node --check server.js

      - name: Smoke tests
        run: npm test

  status-app:
    name: Status-app (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: status-app/package-lock.json

      - name: Install deps
        working-directory: status-app
        run: npm install --no-audit --no-fund

      # Lint informatif : il y a ~58 issues pré-existantes (react-hooks
      # set-state-in-effect, react-refresh/only-export-components, etc.)
      # qu'il faut corriger dans des PRs dédiées. On laisse le step tourner
      # pour les voir, mais on ne bloque pas le CI dessus tant qu'elles
      # n'ont pas été triées.
      - name: Lint (informatif, non-bloquant)
        working-directory: status-app
        continue-on-error: true
        run: npm run lint

      - name: Build (tsc + vite)
        working-directory: status-app
        run: npm run build

  tauri-build:
    name: Tauri build (macOS arm64, unsigned)
    runs-on: macos-14
    needs: status-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: status-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-ci-aarch64-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-aarch64-
            ${{ runner.os }}-cargo-

      - name: Install status-app deps
        working-directory: status-app
        run: npm install --no-audit --no-fund

      - name: Install desktop-tauri deps
        working-directory: desktop-tauri
        run: npm install --no-audit --no-fund

      # `--no-bundle` saute toute l'étape de bundling (et donc la génération
      # de l'artefact updater qui requiert TAURI_SIGNING_PRIVATE_KEY, absent
      # ici). On valide juste que tout le Rust compile et que la SPA est
      # bundlée par `beforeBuildCommand`. La vraie release (signée + notarisée
      # + universal) reste pilotée par release.yml sur tag push / branche
      # release-trigger-*.
      - name: Compile Tauri (Rust + frontend, no bundle)
        working-directory: desktop-tauri
        run: npx tauri build --target aarch64-apple-darwin --no-bundle

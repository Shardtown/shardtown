name: Release Desktop App

# Triggers:
# - Push of a git tag matching `v*` (the canonical flow) — the tag's version
#   *must* match the version declared in tauri.conf.json + Cargo.toml.
# - Push to a `release-trigger-*` branch — the workflow reads the version
#   from tauri.conf.json and creates the tag for you. Useful when the runner
#   can't push tags directly (proxied git remotes, etc.).
# - Manual dispatch from the Actions tab.

on:
  push:
    tags:
      - "v*"
    branches:
      - "release-trigger-*"
  workflow_dispatch:

jobs:
  release:
    name: Build & Release (macOS arm64)
    runs-on: macos-14   # Apple Silicon runner → produces aarch64 builds
    permissions:
      contents: write   # required to create the GitHub Release
    # Step-level `if:` cannot reference the `secrets` context directly
    # (GHA rejects it as "Unrecognized named-value: 'secrets'"). We bounce
    # the presence test through job-level env, which IS allowed to read
    # secrets, then steps gate on env.* instead.
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && 'true' || 'false' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_CONTENT != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          # On a tag push the ref looks like "v0.1.31" — strip the leading "v".
          # On a `release-trigger-*` branch push (or manual dispatch) we read
          # the version from tauri.conf.json so the workflow is self-contained
          # and doesn't depend on how it was triggered.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./desktop-tauri/src-tauri/tauri.conf.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION (triggered by $GITHUB_REF_TYPE $GITHUB_REF_NAME)"

      - name: Discord — build started
        id: discord_start
        # Notif optionnelle : ne doit JAMAIS bloquer le build si Discord
        # est down, le bot révoqué, ou un rate-limit pète.
        continue-on-error: true
        if: env.BOT_TOKEN != '' && env.CHANNEL_ID != ''
        env:
          BOT_TOKEN: ${{ secrets.SHARDTOWN_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.SHARDTOWN_RELEASE_CHANNEL_ID }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Components V2 — flag IS_COMPONENTS_V2 = 1 << 15 = 32768
          # No content/embeds/emojis, just structured components: header text + separator + button row
          PAYLOAD=$(jq -n \
            --arg ver "$VERSION" \
            --arg run "$RUN_URL" \
            '{
              flags: 32768,
              components: [
                { type: 17, accent_color: 16763904, components: [
                  { type: 9, components: [
                    { type: 10, content: "## Build Shardtown \($ver)" },
                    { type: 10, content: "Compilation Rust + bundle Tauri + signature en cours. Patiente ~10 min." }
                  ], accessory: {
                    type: 2, style: 5, label: "Run CI", url: $run
                  }},
                  { type: 14, divider: true, spacing: 1 },
                  { type: 10, content: "Statut : `running`\nVersion : `\($ver)`" }
                ]}
              ]
            }')
          RESPONSE=$(curl -fsS -X POST \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          MSG_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "message_id=$MSG_ID" >> "$GITHUB_OUTPUT"
          echo "Posted message $MSG_ID"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: status-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-universal-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-universal-
            ${{ runner.os }}-cargo-

      - name: Install status-app deps
        working-directory: status-app
        run: npm install --no-audit --no-fund

      - name: Install desktop-tauri deps
        working-directory: desktop-tauri
        run: npm install --no-audit --no-fund

      # Imports the Developer ID Application cert into a temporary keychain on
      # the runner so `tauri build` can codesign the .app + .dmg. The action
      # is skipped if the secret is empty — Tauri then ad-hoc signs and the
      # build still produces an (un-notarized) bundle.
      - name: Import Apple Developer ID certificate
        if: env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Write App Store Connect API key to disk
        if: env.HAS_APPLE_API_KEY == 'true'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
        run: |
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

      - name: Build Tauri bundle (universal, signed + notarized)
        working-directory: desktop-tauri
        env:
          # Tauri Updater signing (ed25519, embedded pubkey)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing (cert imported above into keychain)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Apple notarization (App Store Connect API key — preferred over Apple ID + app-specific password)
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
        run: npx tauri build --target universal-apple-darwin

      - name: Stage release artifacts
        working-directory: desktop-tauri
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p staging
          cp "$BUNDLE_DIR/dmg/Shardtown_${VERSION}_universal.dmg"   "staging/Shardtown_${VERSION}_universal.dmg"
          cp "$BUNDLE_DIR/macos/Shardtown.app.tar.gz"               "staging/Shardtown_${VERSION}.app.tar.gz"
          cp "$BUNDLE_DIR/macos/Shardtown.app.tar.gz.sig"           "staging/Shardtown_${VERSION}.app.tar.gz.sig"
          DOWNLOAD_URL="https://shardtwn.fr/updates/Shardtown_${VERSION}.app.tar.gz"
          node scripts/make-manifest.mjs \
            --version "$VERSION" \
            --notes "Release $VERSION" \
            --sig-path "$BUNDLE_DIR/macos/Shardtown.app.tar.gz.sig" \
            --download-url-darwin-aarch64 "$DOWNLOAD_URL" \
            --download-url-darwin-x86_64 "$DOWNLOAD_URL" \
            --out staging/latest.json
          ls -la staging

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SHARDTWN_SSH_KEY }}

      - name: Trust shardtwn.fr SSH host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SHARDTWN_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync artifacts to shardtwn.fr
        working-directory: desktop-tauri
        run: |
          rsync -avz --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            staging/ \
            "${{ secrets.SHARDTWN_SSH_USER }}@${{ secrets.SHARDTWN_SSH_HOST }}:${{ secrets.SHARDTWN_UPDATES_PATH }}/"

      - name: Create / update private GitHub Release (record-keeping)
        uses: softprops/action-gh-release@v2
        with:
          # Always tag `vX.Y.Z` regardless of whether we were triggered from
          # a tag or a branch — the action creates the tag at the current
          # SHA if it doesn't exist yet.
          tag_name: v${{ steps.meta.outputs.version }}
          name: Shardtown ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}_universal.dmg
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}.app.tar.gz
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}.app.tar.gz.sig
            desktop-tauri/staging/latest.json

      - name: Discord — update final status
        continue-on-error: true
        if: always() && env.BOT_TOKEN != '' && env.CHANNEL_ID != '' && env.MSG_ID != ''
        env:
          BOT_TOKEN: ${{ secrets.SHARDTOWN_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.SHARDTOWN_RELEASE_CHANNEL_ID }}
          MSG_ID: ${{ steps.discord_start.outputs.message_id }}
          VERSION: ${{ steps.meta.outputs.version }}
          STATUS: ${{ job.status }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MANIFEST_URL="https://shardtwn.fr/updates/latest.json"
          DL_URL="https://shardtwn.fr/updates/Shardtown_${VERSION}.app.tar.gz"

          if [ "$STATUS" = "success" ]; then
            ACCENT=5763719
            HEADER="## Shardtown $VERSION publiée"
            BODY="La nouvelle version est en ligne. Les apps déjà installées la verront via le bouton de mise à jour."
            PAYLOAD=$(jq -n \
              --arg ver "$VERSION" \
              --arg run "$RUN_URL" \
              --arg mf "$MANIFEST_URL" \
              --arg dl "$DL_URL" \
              --arg header "$HEADER" \
              --arg body "$BODY" \
              '{
                flags: 32768,
                components: [
                  { type: 17, accent_color: 5763719, components: [
                    { type: 9, components: [
                      { type: 10, content: $header },
                      { type: 10, content: $body }
                    ], accessory: {
                      type: 2, style: 5, label: "Télécharger", url: $dl
                    }},
                    { type: 14, divider: true, spacing: 1 },
                    { type: 10, content: "Version : `\($ver)`\nStatut : `success`" },
                    { type: 1, components: [
                      { type: 2, style: 5, label: "Manifeste", url: $mf },
                      { type: 2, style: 5, label: "Run CI",    url: $run }
                    ]}
                  ]}
                ]
              }')
          else
            HEADER="## Build Shardtown $VERSION échoué"
            BODY="Le build a échoué. Vérifie les logs pour comprendre."
            PAYLOAD=$(jq -n \
              --arg ver "$VERSION" \
              --arg st  "$STATUS" \
              --arg run "$RUN_URL" \
              --arg header "$HEADER" \
              --arg body "$BODY" \
              '{
                flags: 32768,
                components: [
                  { type: 17, accent_color: 15548997, components: [
                    { type: 9, components: [
                      { type: 10, content: $header },
                      { type: 10, content: $body }
                    ], accessory: {
                      type: 2, style: 5, label: "Voir les logs", url: $run
                    }},
                    { type: 14, divider: true, spacing: 1 },
                    { type: 10, content: "Version : `\($ver)`\nStatut : `\($st)`" }
                  ]}
                ]
              }')
          fi

          curl -fsS -X PATCH \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages/$MSG_ID" \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

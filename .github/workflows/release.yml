name: Release Desktop App

# Triggered on git tags v0.1.2, v0.2.0, etc. The tag's version *must* match
# the version declared in desktop-tauri/src-tauri/tauri.conf.json + Cargo.toml.

on:
  push:
    tags:
      - "v*"
  # Lets you trigger manually from the Actions tab for reruns/tests
  workflow_dispatch:

jobs:
  release:
    name: Build & Release (macOS arm64)
    runs-on: macos-14   # Apple Silicon runner → produces aarch64 builds
    permissions:
      contents: write   # required to create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Discord — build started
        id: discord_start
        if: env.BOT_TOKEN != '' && env.CHANNEL_ID != ''
        env:
          BOT_TOKEN: ${{ secrets.SHARDTOWN_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.SHARDTOWN_RELEASE_CHANNEL_ID }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Components V2 — flag IS_COMPONENTS_V2 = 1 << 15 = 32768
          # No content/embeds/emojis, just structured components: header text + separator + button row
          PAYLOAD=$(jq -n \
            --arg ver "$VERSION" \
            --arg run "$RUN_URL" \
            '{
              flags: 32768,
              components: [
                { type: 17, accent_color: 16763904, components: [
                  { type: 10, content: "## Build Shardtown \($ver)" },
                  { type: 10, content: "Compilation Rust + bundle Tauri + signature en cours. Patiente ~10 min." },
                  { type: 14, divider: true, spacing: 1 },
                  { type: 10, content: "Statut : `running`\nVersion : `\($ver)`" },
                  { type: 1, components: [
                    { type: 2, style: 5, label: "Voir le run CI", url: $run }
                  ]}
                ]}
              ]
            }')
          RESPONSE=$(curl -fsS -X POST \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          MSG_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "message_id=$MSG_ID" >> "$GITHUB_OUTPUT"
          echo "Posted message $MSG_ID"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: status-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install status-app deps
        working-directory: status-app
        run: npm install --no-audit --no-fund

      - name: Install desktop-tauri deps
        working-directory: desktop-tauri
        run: npm install --no-audit --no-fund

      - name: Build Tauri bundle (signs via env vars)
        working-directory: desktop-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Stage release artifacts
        working-directory: desktop-tauri
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p staging
          cp "src-tauri/target/release/bundle/dmg/Shardtown_${VERSION}_aarch64.dmg"   "staging/Shardtown_${VERSION}_aarch64.dmg"
          cp  src-tauri/target/release/bundle/macos/Shardtown.app.tar.gz             "staging/Shardtown_${VERSION}.app.tar.gz"
          cp  src-tauri/target/release/bundle/macos/Shardtown.app.tar.gz.sig         "staging/Shardtown_${VERSION}.app.tar.gz.sig"
          node scripts/make-manifest.mjs \
            --version "$VERSION" \
            --notes "Release $VERSION" \
            --sig-path src-tauri/target/release/bundle/macos/Shardtown.app.tar.gz.sig \
            --download-url-darwin-aarch64 "https://shardtwn.fr/updates/Shardtown_${VERSION}.app.tar.gz" \
            --out staging/latest.json
          ls -la staging

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SHARDTWN_SSH_KEY }}

      - name: Trust shardtwn.fr SSH host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SHARDTWN_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync artifacts to shardtwn.fr
        working-directory: desktop-tauri
        run: |
          rsync -avz --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            staging/ \
            "${{ secrets.SHARDTWN_SSH_USER }}@${{ secrets.SHARDTWN_SSH_HOST }}:${{ secrets.SHARDTWN_UPDATES_PATH }}/"

      - name: Create / update private GitHub Release (record-keeping)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Shardtown ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}_aarch64.dmg
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}.app.tar.gz
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}.app.tar.gz.sig
            desktop-tauri/staging/latest.json

      - name: Discord — update final status
        if: always() && env.BOT_TOKEN != '' && env.CHANNEL_ID != '' && env.MSG_ID != ''
        env:
          BOT_TOKEN: ${{ secrets.SHARDTOWN_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.SHARDTOWN_RELEASE_CHANNEL_ID }}
          MSG_ID: ${{ steps.discord_start.outputs.message_id }}
          VERSION: ${{ steps.meta.outputs.version }}
          STATUS: ${{ job.status }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MANIFEST_URL="https://shardtwn.fr/updates/latest.json"
          DL_URL="https://shardtwn.fr/updates/Shardtown_${VERSION}.app.tar.gz"

          if [ "$STATUS" = "success" ]; then
            ACCENT=5763719
            HEADER="## Shardtown $VERSION publiée"
            BODY="La nouvelle version est en ligne. Les apps déjà installées la verront via le bouton de mise à jour."
            PAYLOAD=$(jq -n \
              --arg ver "$VERSION" \
              --arg run "$RUN_URL" \
              --arg mf "$MANIFEST_URL" \
              --arg dl "$DL_URL" \
              --arg header "$HEADER" \
              --arg body "$BODY" \
              '{
                flags: 32768,
                components: [
                  { type: 17, accent_color: 5763719, components: [
                    { type: 10, content: $header },
                    { type: 10, content: $body },
                    { type: 14, divider: true, spacing: 1 },
                    { type: 10, content: "Version : `\($ver)`\nStatut : `success`" },
                    { type: 1, components: [
                      { type: 2, style: 5, label: "Télécharger", url: $dl },
                      { type: 2, style: 5, label: "Manifeste",   url: $mf },
                      { type: 2, style: 5, label: "Run CI",      url: $run }
                    ]}
                  ]}
                ]
              }')
          else
            HEADER="## Build Shardtown $VERSION échoué"
            BODY="Le build a échoué. Vérifie les logs pour comprendre."
            PAYLOAD=$(jq -n \
              --arg ver "$VERSION" \
              --arg st  "$STATUS" \
              --arg run "$RUN_URL" \
              --arg header "$HEADER" \
              --arg body "$BODY" \
              '{
                flags: 32768,
                components: [
                  { type: 17, accent_color: 15548997, components: [
                    { type: 10, content: $header },
                    { type: 10, content: $body },
                    { type: 14, divider: true, spacing: 1 },
                    { type: 10, content: "Version : `\($ver)`\nStatut : `\($st)`" },
                    { type: 1, components: [
                      { type: 2, style: 5, label: "Voir les logs", url: $run }
                    ]}
                  ]}
                ]
              }')
          fi

          curl -fsS -X PATCH \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages/$MSG_ID" \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

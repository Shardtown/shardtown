name: Release Desktop App

# Triggers:
# - Push of a git tag matching `v*` (the canonical flow) — the tag's version
#   *must* match the version declared in tauri.conf.json + Cargo.toml.
# - Push to a `release-trigger-*` branch — the workflow reads the version
#   from tauri.conf.json and creates the tag for you. Useful when the runner
#   can't push tags directly (proxied git remotes, etc.).
# - Manual dispatch from the Actions tab.

on:
  push:
    tags:
      - "v*"
    branches:
      - "release-trigger-*"
  workflow_dispatch:

jobs:
  release:
    name: Build & Release (macOS arm64)
    runs-on: macos-14   # Apple Silicon runner → produces aarch64 builds
    permissions:
      contents: write   # required to create the GitHub Release
    # Step-level `if:` cannot reference the `secrets` context directly
    # (GHA rejects it as "Unrecognized named-value: 'secrets'"). We bounce
    # the presence test through job-level env, which IS allowed to read
    # secrets, then steps gate on env.* instead.
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && 'true' || 'false' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_CONTENT != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          # On a tag push the ref looks like "v0.1.31" — strip the leading "v".
          # On a `release-trigger-*` branch push (or manual dispatch) we read
          # the version from tauri.conf.json so the workflow is self-contained
          # and doesn't depend on how it was triggered.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./desktop-tauri/src-tauri/tauri.conf.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION (triggered by $GITHUB_REF_TYPE $GITHUB_REF_NAME)"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: status-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-universal-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-universal-
            ${{ runner.os }}-cargo-

      - name: Install status-app deps
        working-directory: status-app
        run: npm install --no-audit --no-fund

      - name: Install desktop-tauri deps
        working-directory: desktop-tauri
        run: npm install --no-audit --no-fund

      # Imports the Developer ID Application cert into a temporary keychain on
      # the runner so `tauri build` can codesign the .app + .dmg. The action
      # is skipped if the secret is empty — Tauri then ad-hoc signs and the
      # build still produces an (un-notarized) bundle.
      - name: Import Apple Developer ID certificate
        if: env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Write App Store Connect API key to disk
        if: env.HAS_APPLE_API_KEY == 'true'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
        run: |
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

      - name: Build Tauri bundle (universal, signed + notarized)
        working-directory: desktop-tauri
        env:
          # Tauri Updater signing (ed25519, embedded pubkey)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing (cert imported above into keychain)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Apple notarization (App Store Connect API key — preferred over Apple ID + app-specific password)
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
        run: npx tauri build --target universal-apple-darwin

      - name: Stage release artifacts
        working-directory: desktop-tauri
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p staging
          cp "$BUNDLE_DIR/dmg/Shardtown_${VERSION}_universal.dmg"   "staging/Shardtown_${VERSION}_universal.dmg"
          cp "$BUNDLE_DIR/macos/Shardtown.app.tar.gz"               "staging/Shardtown_${VERSION}.app.tar.gz"
          cp "$BUNDLE_DIR/macos/Shardtown.app.tar.gz.sig"           "staging/Shardtown_${VERSION}.app.tar.gz.sig"
          DOWNLOAD_URL="https://shardtwn.fr/updates/Shardtown_${VERSION}.app.tar.gz"
          node scripts/make-manifest.mjs \
            --version "$VERSION" \
            --notes "Release $VERSION" \
            --sig-path "$BUNDLE_DIR/macos/Shardtown.app.tar.gz.sig" \
            --download-url-darwin-aarch64 "$DOWNLOAD_URL" \
            --download-url-darwin-x86_64 "$DOWNLOAD_URL" \
            --out staging/latest.json
          ls -la staging

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SHARDTWN_SSH_KEY }}

      - name: Trust shardtwn.fr SSH host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SHARDTWN_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync artifacts to shardtwn.fr
        working-directory: desktop-tauri
        run: |
          rsync -avz --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            staging/ \
            "${{ secrets.SHARDTWN_SSH_USER }}@${{ secrets.SHARDTWN_SSH_HOST }}:${{ secrets.SHARDTWN_UPDATES_PATH }}/"

      - name: Create / update private GitHub Release (record-keeping)
        uses: softprops/action-gh-release@v2
        with:
          # Always tag `vX.Y.Z` regardless of whether we were triggered from
          # a tag or a branch — the action creates the tag at the current
          # SHA if it doesn't exist yet.
          tag_name: v${{ steps.meta.outputs.version }}
          name: Shardtown ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}_universal.dmg
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}.app.tar.gz
            desktop-tauri/staging/Shardtown_${{ steps.meta.outputs.version }}.app.tar.gz.sig
            desktop-tauri/staging/latest.json


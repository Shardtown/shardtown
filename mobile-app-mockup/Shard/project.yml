name: Shard
options:
  bundleIdPrefix: fr.shardtown
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: ""           # ← Mets ton Team ID Apple Developer (10 chars) ici
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    GENERATE_INFOPLIST_FILE: NO    # ← on utilise NOTRE Info.plist, pas un généré
targets:
  Shard:
    type: application
    platform: iOS
    sources:
      - path: Shard
        excludes:
          - "Resources/Info.plist"
          - "Resources/Shard.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.shardtown.shard
        INFOPLIST_FILE: Shard/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Shard/Resources/Shard.entitlements
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
